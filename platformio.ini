; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = secret.ini
default_envs = 
	Test_Device
	Olimex_ESP32_Gateway
	Shelly1_storage_ceilingLight
	Sonoff_Basic_R2_v13_office_ceilingLight
	H801_office_workbenchLEDs
	Obi_Jack_office_floodlight
	Shelly_i3_office_wallSwitch
	Obi_Jack_livingRoom_standingLamp
	Obi_Jack_diningRoom_standingLamp
	Shelly1_bedroom_ceilingLight
	Obi_Jack_bedroom_stoneLamp
	H801_bedroom_bedRGBWLEDs
	H801_bedroom_nightstandLEDs
	Shelly_i3_bedroom_wallSwitchDoor
	Obi_Jack_livingRoom_fan
	Shelly_i3_livingRoom_wallSwitch
	Sonoff_Basic_R2_v13_livingRoom_ceilingLight
	Sonoff_Basic_R2_v13_diningRoom_ceilingLight
	Sonoff_Basic_R2_v1_diningRoom_tableLight
	H801_diningRoom_kallaxLEDs
	Shelly_i3_diningRoom_wallSwitch
	H801_kitchen_LEDsRight
	H801_kitchen_LEDsLeft
	Obi_Jack_diningRoom_fan
	Shelly1_hallway_ceilingLightFront
	Sonoff_Basic_R2_v13_hallway_ceilingLightBack
	Shelly1_showerBathroom_ceilingLight
	Shelly1_bathtubBathroom_ceilingLight
	Shelly_i3_kitchen_wallSwitchFront
	Shelly_i3_kitchen_wallSwitchBack
	Shelly_i3_bathtubBathroom_wallSwitchMirror
	Shelly_i3_showerBathroom_wallSwitchDoor
	Shelly_i3_hallway_wallSwitchFront
	Shelly_i3_hallway_wallSwitchBack
	Sonoff_Basic_R2_v1_showerBathroom_mirrorLight
	Sonoff_Basic_R2_v1_showerBathroom_nightLight
	Sonoff_Basic_R2_v1_bathtubBathroom_nightLight

[extra]
logging =
		; -D IOT_NODE_LOGGING
build_flags_pre = 
	!echo "-D IOT_NODE_ENV_BUILD_GIT_REV="$(git rev-parse HEAD)
	-D IOT_NODE_ENV_PIO_ENV=$PIOENV
	-D IOT_NODE_ENV_PIO_PLATFORM=$PIOPLATFORM
	-D IOT_NODE_ENV_PIO_FRAMEWORK=$PIOFRAMEWORK
	-D IOT_NODE_ENV_OTA_PASSWORD="${secret.ota_password}"
	-include "include/utils/pre.h"
	-include "include/secret.h"
build_flags_post = 
	-include "include/utils/post.h"
build_flags_esp32 = 
	-include "include/envs/esp32.h"
build_flags_esp8266 = 
	-include "include/envs/esp8266.h"
lib_deps = 
	adafruit/Adafruit BME280 Library@^2.1.2
	adafruit/Adafruit BusIO@^1.7.2
	adafruit/Adafruit CCS811 Library@^1.0.5
	adafruit/Adafruit MCP9808 Library@^1.1.2
	adafruit/Adafruit SGP30 Sensor@^2.0.0
	adafruit/Adafruit TSL2561@^1.1.0
	adafruit/Adafruit Unified Sensor@^1.1.4
	adafruit/Adafruit VEML6070 Library@^1.0.4
	https://github.com/septillion-git/FadeLed.git#ESP32-support
	lewapek/Nova Fitness Sds dust sensors library@^1.5.0
	sui77/rc-switch@^2.6.4
	wifwaf/MH-Z19@^1.5.3
lib_deps_esp32 = 
lib_deps_esp8266 = 
	me-no-dev/ESPAsyncUDP
serial_bridge = socket://serial.lan.wurstsalat.cloud:23

[env]
framework = arduino
upload_protocol = espota
; upload_port =
; upload_port = ${extra.serial_bridge}
monitor_port = ${extra.serial_bridge}
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 115200

[env_esp32]
build_flags_pre = 
	${extra.build_flags_pre}
	${extra.build_flags_esp32}
	${extra.logging}
platform = espressif32
build_flags = 
	${build_flags_pre}
	${extra.build_flags_post}
lib_deps = 
	${extra.lib_deps}
	${extra.lib_deps_esp32}
upload_flags =
  --port=3232
	--auth=${secret.ota_password}

[env_esp8266]
build_flags_pre = 
	${extra.build_flags_pre}
	${extra.build_flags_esp8266}
	${extra.logging}
platform = espressif8266
build_flags = 
	${build_flags_pre}
	${extra.build_flags_post}
lib_deps = 
	${extra.lib_deps}
	${extra.lib_deps_esp8266}
upload_flags = 
	--auth=${secret.ota_password}

; TESTBED DEVICES

[env:Test_Device]
extends = env_esp32
upload_port = test-device.iot-ng.lan.wurstsalat.cloud
name = Test_Device
board = esp32dev
board_build.flash_mode = dio
build_flags = 
	-D IOT_NODE_ENV_NAME="${name}"
	${env_esp32.build_flags_pre}
	-D IOT_NODE_LINK_ETH
	-include "include/boards/Test_Device.h"
	${extra.build_flags_post}

