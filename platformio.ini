; TESTBED DEVICES

[env:Test_Device]
extends = env_esp32
upload_port = test-device.iot-ng.lan.wurstsalat.cloud
name = Test_Device
board = esp32dev
board_build.flash_mode = dio
build_flags =
	-D IOT_NODE_ENV_NAME="${name}"
	-D IOT_NODE_LINK_ETH
	${env_board_wt32_eth01.build_flags}
	-D IOT_NODE_BOARD_TEST_DEVICE=1
	-D IOT_NODE_BOARD_NAME="\"Test_Device\""
	-D IOT_NODE_INDICATORS
	-D IOT_NODE_INPUT
	-D IOT_NODE_BME280
	-D IOT_NODE_MCP9808
	-D IOT_NODE_MHZ19
	-D IOT_NODE_SDS011
	-D IOT_NODE_TSL2561
	-D IOT_NODE_VEML6070
	-D IOT_NODE_MHZ19_SERIAL=Serial2
	-D IOT_NODE_SDS011_SERIAL=Serial1
	-D RX1=35
	-D TX1=4
	-D RX2=36
	-D TX2=14
	${extra.build_flags_post}
lib_deps =
	${env_esp32.lib_deps}
	adafruit/Adafruit BME280 Library@^2.1.2
	adafruit/Adafruit MCP9808 Library@^1.1.2
	adafruit/Adafruit TSL2561@^1.1.0
	adafruit/Adafruit VEML6070 Library@^1.0.4
