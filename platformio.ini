[extra]
logging =
; :: LOG SETTINGS begin ::
; 		-D IOT_NODE_LOGGING
; 		-fexceptions
; build_type = debug
; :: LOG SETTINGS end ::
build_unflags =
	-fno-exceptions
	-std=gnu++11
	-std=c++11
build_flags_pre =
	-std=c++2a
	!echo "-D IOT_NODE_ENV_BUILD_GIT_REV="$(git rev-parse HEAD)
	-D IOT_NODE_ENV_PIO_ENV=$PIOENV
	-D IOT_NODE_ENV_PIO_PLATFORM=$PIOPLATFORM
	-D IOT_NODE_ENV_PIO_FRAMEWORK=$PIOFRAMEWORK
	-D IOT_NODE_ENV_OTA_PASSWORD="${secret.ota_password}"
	-D IOT_NODE_MUTLITASKING_DELAY=10
	-D IOT_NODE_LOG_DELAY=250
	-include "include/pre.h"
	-include "include/secret.h"
	-D IOT_NODE_SERIAL0_BAUD_RATE=115200
build_flags_post =
	-include "include/post.h"
lib_deps =
	rileyc/FmtLib@^12.1.0
lib_deps_esp32 =
lib_deps_esp8266 =
	me-no-dev/ESPAsyncUDP
serial_bridge = socket://serial.lan.wurstsalat.cloud:23

[env]
framework = arduino
board_build.filesystem = littlefs
; monitor_port = ${extra.serial_bridge}
monitor_speed = 115200
; :: UPLOAD SETTINGS begin ::
upload_port = ${extra.serial_bridge}
upload_protocol = espota
upload_flags =
	--auth=${secret.ota_password}
; :: UPLOAD SETTINGS end ::
upload_speed = 115200

; ESP32

[env_esp32]
build_flags_pre =
	${extra.build_flags_pre}
	-D IOT_NODE_ESP32
	${extra.logging}
; platform = espressif32
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
monitor_filters = esp32_exception_decoder
build_flags =
	${build_flags_pre}
	${extra.build_flags_post}
lib_deps =
	${extra.lib_deps}
	${extra.lib_deps_esp32}

; ESP8266

[env_esp8266]
build_flags_pre =
	${extra.build_flags_pre}
	-D IOT_NODE_ESP8266
	-D IOT_NODE_LINK_WIFI
	${extra.logging}
platform = espressif8266
build_flags =
	${build_flags_pre}
	${extra.build_flags_post}
lib_deps =
	${extra.lib_deps}
	${extra.lib_deps_esp8266}

[env_board_wt32_eth01]
extends = env_esp32
board = esp32dev
board_build.flash_mode = dio
build_flags =
	${env_esp32.build_flags_pre}
	-D ENV_SCOPED_SETUP
	-D IOT_NODE_WT32_ETH01
	-D IOT_NODE_HARDWARE_NAME="\"WT32-ETH01\""
lib_deps =
	${env_esp32.lib_deps}

