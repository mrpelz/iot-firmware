; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[extra]
build_flags_pre = 
	; pio
	!echo "-D IOT_NODE_BUILD_GIT_REV="$(git rev-parse HEAD)
	-D IOT_NODE_PIO_ENV=$PIOENV
	-D IOT_NODE_PIO_PLATFORM=$PIOPLATFORM
	-D IOT_NODE_PIO_FRAMEWORK=$PIOFRAMEWORK
	; env
	-include "include/utils/pre.h"
	-include "include/secret.h"
	-include "include/env.h"
build_flags_post = 
	-include "include/utils/post.h"
lib_deps = 
	adafruit/Adafruit BME280 Library@^2.1.2
	adafruit/Adafruit BusIO@^1.7.2
	adafruit/Adafruit CCS811 Library@^1.0.5
	adafruit/Adafruit MCP9808 Library@^1.1.2
	adafruit/Adafruit SGP30 Sensor@^2.0.0
	adafruit/Adafruit TSL2561@^1.1.0
	adafruit/Adafruit Unified Sensor@^1.1.4
	adafruit/Adafruit VEML6070 Library@^1.0.4
	https://github.com/septillion-git/FadeLed.git#ESP32-support
	lewapek/Nova Fitness Sds dust sensors library@^1.5.0
	wifwaf/MH-Z19@^1.5.3

[env]
framework = arduino
upload_port = socket://serial.net.wurstsalat.cloud:23
monitor_port = socket://serial.net.wurstsalat.cloud:23
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 115200

[env:esp32]
platform = espressif32@3.0.0
board = esp32dev
build_flags = 
	${extra.build_flags_pre}
	-include "include/envs/esp32.h"
	${extra.build_flags_post}
lib_deps = ${extra.lib_deps}

[env:esp8266]
platform = espressif8266
board = esp01_1m
build_flags = 
	${extra.build_flags_pre}
	-include "include/envs/esp8266.h"
	${extra.build_flags_post}
lib_deps = 
	${extra.lib_deps}
	me-no-dev/ESPAsyncUDP

[env:esp8266_dout]
platform = espressif8266
board = esp01_1m
board_build.flash_mode = dout
build_flags = 
	${extra.build_flags_pre}
	-include "include/envs/esp8266.h"
	${extra.build_flags_post}
lib_deps = 
	${extra.lib_deps}
	me-no-dev/ESPAsyncUDP
