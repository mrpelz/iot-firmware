; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
framework = arduino
upload_port = socket://serial.net.wurstsalat.cloud:23
monitor_port = socket://serial.net.wurstsalat.cloud:23
build_flags = 
	; default
	!echo "-D IOT_NODE_BUILD_GIT_REV="$(git rev-parse HEAD)
	-D IOT_NODE_PIO_ENV=$PIOENV
	-D IOT_NODE_PIO_PLATFORM=$PIOPLATFORM
	-D IOT_NODE_PIO_FRAMEWORK=$PIOFRAMEWORK
	-D ARDUINO_SAMD_VARIANT_COMPLIANCE
	-D RX1=35
	-D TX1=4
	; ip
	-D IOT_NODE_DHCP
	; link
	-D IOT_NODE_LINK_ETH
	-D IOT_NODE_WT32_ETH01
	; i2c-scan
	-D IOT_NODE_I2C_SCAN
	; sensors
	-D IOT_NODE_BME280
	-D IOT_NODE_MCP9808
	-D IOT_NODE_SDS011
	-D IOT_NODE_TSL2561
	-D IOT_NODE_VEML6070

[env:esp32]
platform = espressif32@3.0.0
board = esp32dev
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 115200
lib_deps = 
	adafruit/Adafruit BME280 Library@^2.1.2
	adafruit/Adafruit BusIO@^1.7.2
	adafruit/Adafruit CCS811 Library@^1.0.5
	adafruit/Adafruit MCP9808 Library@^1.1.2
	adafruit/Adafruit SGP30 Sensor@^2.0.0
	adafruit/Adafruit TSL2561@^1.1.0
	adafruit/Adafruit Unified Sensor@^1.1.4
	adafruit/Adafruit VEML6070 Library@^1.0.4
	lewapek/Nova Fitness Sds dust sensors library@^1.5.0
	wifwaf/MH-Z19@^1.5.3

[env:esp8266]
platform = espressif8266
board = esp01_1m
board_build.filesystem = littlefs
monitor_speed = 74880
upload_speed = 74880
lib_deps = 
	adafruit/Adafruit BME280 Library@^2.1.2
	adafruit/Adafruit BusIO@^1.7.2
	adafruit/Adafruit CCS811 Library@^1.0.5
	adafruit/Adafruit MCP9808 Library@^1.1.2
	adafruit/Adafruit SGP30 Sensor@^2.0.0
	adafruit/Adafruit TSL2561@^1.1.0
	adafruit/Adafruit Unified Sensor@^1.1.4
	adafruit/Adafruit VEML6070 Library@^1.0.4
	lewapek/Nova Fitness Sds dust sensors library@^1.5.0
	me-no-dev/ESPAsyncUDP
	wifwaf/MH-Z19@^1.5.3
