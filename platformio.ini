; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = tmp.ini

[extra]
build_flags_pre = 
	!echo "-D IOT_NODE_ENV_BUILD_GIT_REV="$(git rev-parse HEAD)
	-D IOT_NODE_ENV_PIO_ENV=$PIOENV
	-D IOT_NODE_ENV_PIO_PLATFORM=$PIOPLATFORM
	-D IOT_NODE_ENV_PIO_FRAMEWORK=$PIOFRAMEWORK
	-D IOT_NODE_ENV_NAME="${tmp.name}"
	-D IOT_NODE_ENV_OTA_PASSWORD="${tmp.ota_password}"
	-include "include/utils/pre.h"
	-include "include/secret.h"
build_flags_post = 
	-include "include/utils/post.h"
lib_deps = 
	adafruit/Adafruit BME280 Library@^2.1.2
	adafruit/Adafruit BusIO@^1.7.2
	adafruit/Adafruit CCS811 Library@^1.0.5
	adafruit/Adafruit MCP9808 Library@^1.1.2
	adafruit/Adafruit SGP30 Sensor@^2.0.0
	adafruit/Adafruit TSL2561@^1.1.0
	adafruit/Adafruit Unified Sensor@^1.1.4
	adafruit/Adafruit VEML6070 Library@^1.0.4
	https://github.com/septillion-git/FadeLed.git#ESP32-support
	lewapek/Nova Fitness Sds dust sensors library@^1.5.0
	sui77/rc-switch@^2.6.4
	wifwaf/MH-Z19@^1.5.3
serial_bridge = socket://serial.net.wurstsalat.cloud:23

[env]
framework = arduino
upload_protocol = espota
upload_port = ${tmp.ota_host}
; upload_port = ${extra.serial_bridge}
monitor_port = ${extra.serial_bridge}
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 115200

[env:esp32]
platform = espressif32
board = ${tmp.board}
build_flags = 
	${extra.build_flags_pre}
	-include "include/envs/esp32.h"
	${tmp.build_flags_tmp_0}
	${tmp.build_flags_tmp_1}
	${extra.build_flags_post}
lib_deps = 
	${extra.lib_deps}
	https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git
upload_flags =
  --port=3232
	--auth=${tmp.ota_password}

[env:esp8266]
platform = espressif8266
board = ${tmp.board}
build_flags = 
	${extra.build_flags_pre}
	-include "include/envs/esp8266.h"
	${tmp.build_flags_tmp_0}
	${tmp.build_flags_tmp_1}
	${extra.build_flags_post}
lib_deps = 
	${extra.lib_deps}
	me-no-dev/ESPAsyncUDP
upload_flags = 
	--auth=${tmp.ota_password}
