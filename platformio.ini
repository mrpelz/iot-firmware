	-D IOT_NODE_INDICATORS
	-D IOT_NODE_MCP9808
	; -D IOT_NODE_MHZ19
	-D IOT_NODE_MHZ19_SERIAL=Serial2
	; -D IOT_NODE_SDS011
	-D IOT_NODE_SDS011_SERIAL=Serial1
	-D IOT_NODE_SGP30
	-D IOT_NODE_SX1509
	-D IOT_NODE_TSL2561
